name: CI
on:
  push:
    branches:
      - 'main'
      - 'scratch/**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-22.04
            r: 4.1.3
            # distributional 0.8.0 requires R 4.3 through its use of
            # chooseOpsMethod.
            distributional_pkg: 'url::https://mpn.metworx.com/snapshots/stable/2026-05-27/src/contrib/distributional_0.7.0.tar.gz'
            pinned: true
          - os: ubuntu-22.04
            r: 4.2.3
            # distributional 0.8.0 requires R 4.3 through its use of
            # chooseOpsMethod.
            distributional_pkg: 'url::https://mpn.metworx.com/snapshots/stable/2026-05-27/src/contrib/distributional_0.7.0.tar.gz'
            pinned: true
          - os: ubuntu-22.04
            r: 4.3.1
          - os: ubuntu-latest
            r: release
    env:
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            ${{ matrix.config.distributional_pkg }}
          upgrade: ${{ matrix.config.pinned && 'FALSE' || 'TRUE' }}
      - name: Install pdflatex
        shell: bash
        run: sudo apt-get install texlive-latex-base texlive-fonts-extra tidy
      - name: Check package
        shell: bash
        run: make ci
      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: "*.Rcheck"
  release:
    if: github.ref_type == 'tag'
    name: Upload release
    needs: check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: metrumresearchgroup/actions/mpn-latest@v1
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
          # For pkgpub.
          extra-repositories: 'https://mpn.metworx.com/snapshots/stable/${{ env.MPN_LATEST }}'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgpub
      - uses: metrumresearchgroup/actions/publish-r-release@v1
